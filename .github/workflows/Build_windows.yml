name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Run tests
        run: |
          pip install pytest
          pytest tests/
        env:
          PYTHONPATH: .

      - name: Build executable
        run: pyinstaller MediaForge.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaForge-windows
          path: dist/MediaForge.exe

      # On version tags (e.g. v0.1.0), attach the exe to a GitHub Release
      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MediaForge.exe
